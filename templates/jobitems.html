<div class="border border-success p-2 mb-2 border-opacity-50 row"
    style="margin-bottom: 16px; padding-bottom: 8px;">
    <div class="col-10">
        <h4 style="color: darkslategrey; margin: auto;">
            {{job['title']}} 
        </h4>
        <div>
            <b>Location : </b> {{job['Location']}}
        </div>
        {% if 'Salary' in job %}    
        <div> 
            <b>Salary : </b> {{job['Salary']}}
        </div>    
        {% endif %}
    </div>
    <div class="col-2">
        <button type="button" class="btn btn-outline-info">Apply</button>
    </div>
</div>
